# /etc/nftables.d/seed.conf — 443 は Cloudflare のみ。SSH は宅内から
table inet filter {
    set cf4 { type ipv4_addr; flags interval; }
    set cf6 { type ipv6_addr; flags interval; }
    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        iif lo accept
        tcp dport 443 ip saddr @cf4 accept
        tcp dport 443 ip6 saddr @cf6 accept
        tcp dport 22 ip saddr 192.168.0.0/16 accept
        icmp type echo-request accept
        icmpv6 type { echo-request, nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } accept
    }
}
